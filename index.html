<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kontrollraum</title>
<style>
:root {
  --bg: #0D0B09;
  --s1: #141210;
  --s2: #1C1915;
  --s3: #232019;
  --bd: #2C2820;
  --txt: #EDE6D8;
  --mut: #7A7060;
  --gold: #C9A24B;
  --grn: #5E9E62;
  --red: #B05A42;
  --blu: #5080B8;
  --nh: 62px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--txt); overflow: hidden; }

/* ── LAYOUT ── */
#shell { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
#content { flex: 1; overflow: hidden; position: relative; }

/* ── VIEWS ── */
.view {
  position: absolute; inset: 0;
  overflow-y: auto; overflow-x: hidden;
  padding: 0 0 calc(var(--nh) + 16px) 0;
  display: none;
  -webkit-overflow-scrolling: touch;
}
.view.on { display: block; }
.vpad { padding: 0 16px; }

/* ── TOP BAR ── */
.topbar {
  background: var(--s1);
  border-bottom: 1px solid var(--bd);
  padding: 14px 16px 12px;
  position: sticky; top: 0; z-index: 10;
}
.topbar-row { display: flex; justify-content: space-between; align-items: center; }
.topbar h1 { font-size: 22px; font-weight: 700; }
.topbar .date { font-size: 12px; color: var(--mut); margin-top: 2px; }
.topbar-btn {
  background: var(--s3); border: 1px solid var(--bd); color: var(--gold);
  border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}

/* ── BOTTOM NAV ── */
#nav {
  height: var(--nh);
  background: var(--s1);
  border-top: 1px solid var(--bd);
  display: flex;
  flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.nb {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; background: none; border: none;
  color: var(--mut); font-size: 10px; font-weight: 500;
  cursor: pointer; font-family: inherit;
  transition: color 0.15s;
}
.nb svg { width: 22px; height: 22px; stroke-width: 1.8; fill: none; stroke: currentColor; }
.nb.on { color: var(--gold); }

/* ── CARDS ── */
.card { background: var(--s2); border: 1px solid var(--bd); border-radius: 14px; padding: 16px; margin: 12px 16px 0; }
.card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--mut); margin-bottom: 14px; }
.card-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.card-hdr .card-title { margin-bottom: 0; }

/* ── STAT ROW ── */
.stats3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 12px 16px 0; }
.stat { background: var(--s2); border: 1px solid var(--bd); border-radius: 12px; padding: 14px 10px; text-align: center; }
.stat .n { font-size: 24px; font-weight: 700; color: var(--gold); line-height: 1; }
.stat .l { font-size: 10px; color: var(--mut); margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }

/* ── COACH CARD ── */
.coach {
  margin: 12px 16px 0;
  background: linear-gradient(135deg, #1e1a0e, #231d10);
  border: 1px solid #3a3020;
  border-radius: 14px; padding: 16px;
  display: flex; gap: 12px;
}
.coach-ico { font-size: 24px; flex-shrink: 0; margin-top: 2px; }
.coach-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 5px; }
.coach-txt { font-size: 14px; line-height: 1.55; color: var(--txt); }

/* ── LIST ITEMS ── */
.li { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--bd); cursor: pointer; }
.li:last-child { border-bottom: none; padding-bottom: 0; }
.li:first-child { padding-top: 0; }
.li-txt { flex: 1; font-size: 14px; line-height: 1.3; }
.li-sub { font-size: 12px; color: var(--mut); margin-top: 2px; }
.li-txt.done { text-decoration: line-through; color: var(--mut); }
.check {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  border: 2px solid var(--bd); display: flex; align-items: center;
  justify-content: center; font-size: 14px; transition: all .15s;
}
.check.on { background: var(--grn); border-color: var(--grn); color: #0D0B09; font-weight: 700; }
.li-right { font-size: 12px; color: var(--mut); flex-shrink: 0; }
.li-gold { color: var(--gold); font-weight: 700; }

/* ── SCHEDULE ── */
.ev-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.ev-time { font-size: 12px; font-weight: 700; color: var(--gold); min-width: 44px; padding-top: 2px; }

/* ── PROGRESS ── */
.prog-wrap { margin-top: 10px; }
.prog-track { height: 6px; background: var(--s1); border-radius: 6px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 6px; transition: width .4s; }

/* ── HABIT HEATMAP ── */
.heat { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 10px; }
.hc { width: 17px; height: 17px; border-radius: 3px; background: var(--s1); }
.hc.on { background: var(--grn); }
.habit-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.streak-badge { background: var(--s1); border: 1px solid var(--bd); border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 700; color: var(--gold); flex-shrink: 0; }

/* ── GOAL ── */
.goal-pct { font-size: 28px; font-weight: 700; color: var(--gold); }
.ms-row { display: flex; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--bd); cursor: pointer; }
.ms-row:last-child { border-bottom: none; padding-bottom: 0; }
.ms-circle { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--bd); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
.ms-circle.on { background: var(--gold); border-color: var(--gold); color: #0D0B09; }
.ms-txt { font-size: 13px; flex: 1; }
.ms-txt.done { text-decoration: line-through; color: var(--mut); }

/* ── ENERGY ── */
.energy-grid { display: flex; gap: 10px; }
.eslot { flex: 1; text-align: center; }
.eslot label { font-size: 11px; color: var(--mut); display: block; margin-bottom: 6px; }
.stars { display: flex; justify-content: center; gap: 2px; }
.star { font-size: 18px; cursor: pointer; line-height: 1; }

/* ── PRIO ── */
.prio-item { display: flex; gap: 12px; align-items: flex-start; padding: 11px 0; border-bottom: 1px solid var(--bd); cursor: pointer; }
.prio-item:last-child { border-bottom: none; padding-bottom: 0; }
.prio-num { width: 26px; height: 26px; border-radius: 50%; background: var(--s1); border: 1px solid var(--bd); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--gold); flex-shrink: 0; margin-top: 1px; }
.prio-txt { flex: 1; font-size: 14px; color: var(--mut); font-style: italic; }
.prio-txt.set { color: var(--txt); font-style: normal; }

/* ── WEEK GRID ── */
.wgrid { width: 100%; border-collapse: collapse; }
.wgrid td, .wgrid th { text-align: center; padding: 3px; }
.wgrid .wn { text-align: left; font-size: 11px; color: var(--mut); max-width: 78px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 6px; }
.gd { width: 26px; height: 26px; border-radius: 7px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
.gd.ok { background: var(--grn); color: #0D0B09; }
.gd.no { background: var(--s1); color: var(--mut); }
.gd.ft { color: var(--bd); }
.gd.td { border: 1.5px solid var(--gold); }

/* ── JOURNAL ── */
.j-item { padding: 13px 0; border-bottom: 1px solid var(--bd); }
.j-item:last-child { border-bottom: none; padding-bottom: 0; }
.j-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.j-date { font-size: 11px; color: var(--gold); font-weight: 600; }
.j-txt { font-size: 13px; color: var(--mut); line-height: 1.5; }

/* ── ANALYSE ── */
.ins-row { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--bd); align-items: flex-start; }
.ins-row:last-child { border-bottom: none; padding-bottom: 0; }
.ins-ico { font-size: 20px; flex-shrink: 0; }
.ins-txt { font-size: 13px; line-height: 1.5; }
.kv { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--bd); }
.kv:last-child { border-bottom: none; padding-bottom: 0; }
.kv-k { font-size: 13px; color: var(--mut); }
.kv-v { font-size: 13px; font-weight: 600; }

/* ── MODAL ── */
#mo-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 50; align-items: flex-end; }
#mo-bg.on { display: flex; }
#mo-box {
  background: var(--s2); border-top: 1px solid var(--bd);
  border-radius: 22px 22px 0 0;
  padding: 20px 20px calc(env(safe-area-inset-bottom, 0px) + 20px);
  width: 100%; max-height: 88vh; overflow-y: auto;
  transform: translateY(100%);
  transition: transform .28s ease;
}
#mo-bg.on #mo-box { transform: translateY(0); }
#mo-box h3 { font-size: 18px; font-weight: 700; margin-bottom: 18px; }
.mo-row { display: flex; gap: 10px; }
.mo-row > * { flex: 1; }
.mo-acts { display: flex; gap: 10px; margin-top: 18px; }
.mo-acts .btn { flex: 1; padding: 14px; }

/* ── BUTTONS ── */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: none; border-radius: 12px; padding: 11px 16px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-p { background: var(--gold); color: #0D0B09; }
.btn-g { background: var(--s3); color: var(--mut); border: 1px solid var(--bd); }
.btn-s { background: var(--s3); color: var(--red); border: 1px solid var(--bd); }
.btn-sm { padding: 8px 13px; font-size: 12px; border-radius: 9px; }

/* ── FAB ── */
#fab { position: fixed; bottom: calc(var(--nh) + 14px + env(safe-area-inset-bottom, 0px)); right: 18px; z-index: 40; width: 52px; height: 52px; border-radius: 50%; background: var(--gold); color: #0D0B09; border: none; font-size: 28px; cursor: pointer; box-shadow: 0 4px 20px rgba(201,162,75,.45); display: flex; align-items: center; justify-content: center; }

/* ── FORM ── */
input, textarea, select { background: var(--s1); border: 1px solid var(--bd); color: var(--txt); border-radius: 10px; padding: 12px 14px; font-size: 15px; width: 100%; font-family: inherit; -webkit-appearance: none; appearance: none; }
input:focus, textarea:focus, select:focus { outline: 1px solid var(--gold); }
textarea { resize: none; min-height: 90px; }
.fld { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.fld label { font-size: 12px; color: var(--mut); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

/* ── MOOD ── */
.moods { display: flex; gap: 8px; }
.mood { flex: 1; text-align: center; padding: 10px 2px; background: var(--s1); border: 2px solid var(--bd); border-radius: 12px; font-size: 24px; cursor: pointer; }
.mood.on { border-color: var(--gold); background: var(--s3); }

/* ── MISC ── */
.empty { text-align: center; color: var(--mut); font-size: 13px; padding: 20px 0; }
.spacer { height: 12px; }
.tag { font-size: 10px; font-weight: 700; padding: 3px 7px; border-radius: 20px; }
.tag-g { background: rgba(94,158,98,.15); color: var(--grn); }
.tag-b { background: rgba(80,128,184,.15); color: var(--blu); }
.tag-r { background: rgba(176,90,66,.15); color: var(--red); }
.divider { height: 1px; background: var(--bd); margin: 14px 0; }
.pill { font-size: 11px; font-weight: 700; color: var(--gold); }
</style>
</head>
<body>
<div id="shell">
  <div id="content">

    <!-- ═══════════ HEUTE ═══════════ -->
    <div class="view on" id="v-heute">
      <div class="topbar">
        <div class="topbar-row">
          <div>
            <h1 id="greet">Hallo 👋</h1>
            <div class="date" id="hdate"></div>
          </div>
          <button class="topbar-btn" onclick="openPrio()">📌 Prios</button>
        </div>
      </div>

      <div class="coach" id="coachCard">
        <div class="coach-ico">⚡</div>
        <div><div class="coach-lbl">Coach</div><div class="coach-txt" id="coachTxt">Lade…</div></div>
      </div>

      <div class="card">
        <div class="card-title">Meine 3 Prioritäten</div>
        <div id="prioList"></div>
      </div>

      <div class="card">
        <div class="card-hdr">
          <div class="card-title">Habits heute</div>
          <span class="pill" id="habitPill"></span>
        </div>
        <div id="habitToday"></div>
        <div class="prog-wrap" id="habitProg" style="display:none">
          <div class="prog-track"><div class="prog-fill" id="habitProgFill" style="background:var(--grn);"></div></div>
        </div>
      </div>

      <div class="card">
        <div class="card-hdr">
          <div class="card-title">Zeitplan</div>
          <button class="btn btn-g btn-sm" onclick="openEv()">+ Termin</button>
        </div>
        <div id="scheduleList"></div>
      </div>

      <div class="card">
        <div class="card-title">Energie heute</div>
        <div class="energy-grid" id="energyGrid"></div>
      </div>

      <div class="spacer"></div>
    </div>

    <!-- ═══════════ WOCHE ═══════════ -->
    <div class="view" id="v-woche">
      <div class="topbar">
        <div class="topbar-row">
          <div>
            <h1>Woche</h1>
            <div class="date" id="wdate"></div>
          </div>
          <button class="topbar-btn" onclick="openEv()">+ Termin</button>
        </div>
      </div>

      <div class="stats3" id="wstats"></div>

      <div class="card">
        <div class="card-title">Habit-Grid</div>
        <div style="overflow-x:auto;"><table class="wgrid" id="wgrid"></table></div>
      </div>

      <div class="card">
        <div class="card-hdr">
          <div class="card-title">Termine & Lernblöcke</div>
        </div>
        <div id="weekEvents"></div>
      </div>

      <div class="card">
        <div class="card-title">To-dos</div>
        <div id="todoList"></div>
        <button class="btn btn-g btn-sm" style="margin-top:12px;width:100%;" onclick="openTodo()">+ Neues To-do</button>
      </div>

      <div class="spacer"></div>
    </div>

    <!-- ═══════════ HABITS ═══════════ -->
    <div class="view" id="v-habits">
      <div class="topbar">
        <div class="topbar-row">
          <h1>Gewohnheiten</h1>
          <button class="topbar-btn" onclick="openHabit()">+ Neu</button>
        </div>
      </div>
      <div id="habitList" style="padding:0 0 12px;"></div>
    </div>

    <!-- ═══════════ ZIELE ═══════════ -->
    <div class="view" id="v-ziele">
      <div class="topbar">
        <div class="topbar-row">
          <h1>Ziele</h1>
          <button class="topbar-btn" onclick="openGoal()">+ Neu</button>
        </div>
      </div>
      <div id="goalList" style="padding:0 0 12px;"></div>
    </div>

    <!-- ═══════════ ANALYSE ═══════════ -->
    <div class="view" id="v-analyse">
      <div class="topbar">
        <div class="topbar-row">
          <h1>Analyse</h1>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Coach-Insights</div>
        <div id="insightList"></div>
      </div>

      <div class="card">
        <div class="card-title">Deine Zahlen</div>
        <div id="statList"></div>
      </div>

      <div class="card">
        <div class="card-title">Habit-Performance (30 Tage)</div>
        <div id="habitPerf"></div>
      </div>

      <div class="card">
        <div class="card-title">Journal-Einträge</div>
        <div id="journalList"></div>
        <button class="btn btn-g btn-sm" style="margin-top:12px;width:100%;" onclick="openJournal()">+ Eintrag</button>
      </div>

      <div class="divider"></div>

      <div style="padding:0 16px 16px; display:flex; gap:10px;">
        <button class="btn btn-g" style="flex:1;" onclick="exportD()">⬇ Export</button>
        <button class="btn btn-g" style="flex:1;" onclick="document.getElementById('impFile').click()">⬆ Import</button>
      </div>
      <input type="file" id="impFile" accept=".json" style="display:none" onchange="importD(event)">
      <div class="spacer"></div>
    </div>

  </div>

  <!-- ═══════════ BOTTOM NAV ═══════════ -->
  <nav id="nav">
    <button class="nb on" onclick="goTo('heute')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      Heute
    </button>
    <button class="nb" onclick="goTo('woche')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Woche
    </button>
    <button class="nb" onclick="goTo('habits')">
      <svg viewBox="0 0 24 24"><polyline points="9,11 12,14 22,4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Habits
    </button>
    <button class="nb" onclick="goTo('ziele')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      Ziele
    </button>
    <button class="nb" onclick="goTo('analyse')">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Analyse
    </button>
  </nav>
</div>

<!-- FAB -->
<button id="fab" onclick="openFab()">+</button>

<!-- MODAL -->
<div id="mo-bg" onclick="if(event.target===this) closeMo()">
  <div id="mo-box"><div id="mo-inner"></div></div>
</div>

<script>
// ════════════════════════════════
// STATE
// ════════════════════════════════
const SK = 'kr_v4';
let S = (() => {
  try { return JSON.parse(localStorage.getItem(SK)) || {}; } catch(e) { return {}; }
})();
S.events   = S.events   || [];
S.todos    = S.todos    || [];
S.habits   = S.habits   || [];
S.goals    = S.goals    || [];
S.journal  = S.journal  || [];
S.energy   = S.energy   || {};
S.prios    = S.prios    || {};
function save() { try { localStorage.setItem(SK, JSON.stringify(S)); } catch(e) {} }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function esc(s) { const d = document.createElement('div'); d.textContent = String(s||''); return d.innerHTML; }

// ════════════════════════════════
// DATE HELPERS
// ════════════════════════════════
const WD   = ['So','Mo','Di','Mi','Do','Fr','Sa'];
const MO   = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const MOS  = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

function fd(d) { return d.toISOString().slice(0,10); }
function addD(d, n) { const x = new Date(d); x.setDate(x.getDate()+n); return x; }
function sow(d) {
  const x = new Date(d); x.setHours(12,0,0,0);
  x.setDate(x.getDate() - ((x.getDay()+6)%7));
  return x;
}
const TODAY = fd(new Date());

function streak(h) {
  let n = 0, d = new Date();
  d.setHours(12,0,0,0);
  while (true) {
    if (h.log && h.log[fd(d)]) { n++; d = addD(d,-1); }
    else break;
  }
  return n;
}

// ════════════════════════════════
// NAVIGATION
// ════════════════════════════════
let curView = 'heute';

function goTo(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(el => el.classList.remove('on'));
  const viewEl = document.getElementById('v-' + v);
  const navEl = document.querySelector(`.nb[onclick="goTo('${v}')"]`);
  if (viewEl) viewEl.classList.add('on');
  if (navEl) navEl.classList.add('on');
  curView = v;
  renderView(v);
  // scroll to top of new view
  if (viewEl) viewEl.scrollTop = 0;
}

function renderView(v) {
  if (v === 'heute')   rHeute();
  if (v === 'woche')   rWoche();
  if (v === 'habits')  rHabits();
  if (v === 'ziele')   rZiele();
  if (v === 'analyse') rAnalyse();
}

// ════════════════════════════════
// HEUTE
// ════════════════════════════════
function rHeute() {
  const d = new Date();
  const h = d.getHours();
  document.getElementById('greet').textContent =
    (h < 12 ? 'Guten Morgen' : h < 18 ? 'Guten Tag' : 'Guten Abend') + ' 👋';
  document.getElementById('hdate').textContent =
    WD[d.getDay()] + ', ' + d.getDate() + '. ' + MO[d.getMonth()] + ' ' + d.getFullYear();

  // Coach
  const c = coachMsg();
  document.getElementById('coachTxt').textContent = c.t;
  document.querySelector('#coachCard .coach-ico').textContent = c.i;

  // Prioritäten
  const prios = S.prios[TODAY] || ['','',''];
  document.getElementById('prioList').innerHTML = [0,1,2].map(i =>
    `<div class="prio-item" onclick="openPrio()">
      <div class="prio-num">${i+1}</div>
      <div class="prio-txt${prios[i]?' set':''}">${prios[i] ? esc(prios[i]) : 'Tippe zum Setzen…'}</div>
    </div>`
  ).join('');

  // Habits
  const done = S.habits.filter(h => h.log && h.log[TODAY]).length;
  const tot  = S.habits.length;
  document.getElementById('habitPill').textContent = tot ? done + '/' + tot : '';
  if (tot === 0) {
    document.getElementById('habitToday').innerHTML = '<div class="empty">Noch keine Habits – lege welche unter ✅ an.</div>';
    document.getElementById('habitProg').style.display = 'none';
  } else {
    document.getElementById('habitProg').style.display = 'block';
    document.getElementById('habitProgFill').style.width = Math.round(done/tot*100) + '%';
    document.getElementById('habitToday').innerHTML = S.habits.map(h => {
      const ok = h.log && h.log[TODAY];
      const s  = streak(h);
      return `<div class="li" onclick="togH('${h.id}')">
        <div class="check${ok?' on':''}">${ok?'✓':''}</div>
        <div class="li-txt${ok?' done':''}">
          ${esc(h.name)}
          <div class="li-sub">${['💪 Körper','🧠 Geist','📈 Karriere','⚡ Sonstiges'][['körper','geist','karriere','sonstiges'].indexOf(h.cat)||3]}</div>
        </div>
        ${s>1 ? `<span class="li-right li-gold">🔥 ${s}</span>` : ''}
      </div>`;
    }).join('');
  }

  // Zeitplan
  const evs = S.events.filter(e => e.date === TODAY).sort((a,b) => a.start.localeCompare(b.start));
  const tc = {fixed:'var(--blu)', study:'var(--grn)', todo:'var(--red)'};
  document.getElementById('scheduleList').innerHTML = evs.length === 0
    ? '<div class="empty">Nichts geplant – tippe "+" unten rechts.</div>'
    : evs.map(e => `<div class="li" onclick="openEv('${e.id}')">
        <div class="ev-time">${e.start}</div>
        <div class="ev-dot" style="background:${tc[e.type]||'var(--gold)'}"></div>
        <div class="li-txt">
          ${esc(e.title)}
          <div class="li-sub">${e.end}${e.type==='study'?' · Lernblock':e.type==='fixed'?' · Termin':' · Aufgabe'}</div>
        </div>
      </div>`).join('');

  // Energie
  const eng = S.energy[TODAY] || {};
  const eSlots = [{k:'morning',l:'Morgen'},{k:'afternoon',l:'Mittag'},{k:'evening',l:'Abend'}];
  document.getElementById('energyGrid').innerHTML = eSlots.map(sl => {
    const v = eng[sl.k] || 0;
    return `<div class="eslot">
      <label>${sl.l}</label>
      <div class="stars">${[1,2,3,4,5].map(n =>
        `<span class="star" onclick="setE('${sl.k}',${n})">${n<=v?'★':'☆'}</span>`
      ).join('')}</div>
    </div>`;
  }).join('');
}

function togH(id) {
  const h = S.habits.find(x=>x.id===id); if(!h) return;
  if (!h.log) h.log = {};
  h.log[TODAY] = !h.log[TODAY];
  save(); rHeute();
}
function setE(slot, val) {
  if (!S.energy[TODAY]) S.energy[TODAY] = {};
  S.energy[TODAY][slot] = val;
  save(); rHeute();
}

// ════════════════════════════════
// WOCHE
// ════════════════════════════════
function rWoche() {
  const sw = sow(new Date());
  const wds = Array.from({length:7}, (_,i) => fd(addD(sw,i)));

  document.getElementById('wdate').textContent =
    addD(sw,0).getDate() + '. – ' + addD(sw,6).getDate() + '. ' + MO[addD(sw,6).getMonth()];

  const wEvs = S.events.filter(e => wds.includes(e.date));
  const hDone = S.habits.reduce((s,h) => s + wds.filter(d => h.log&&h.log[d]).length, 0);
  const hMax  = S.habits.length * 7;
  const smins = wEvs.filter(e=>e.type==='study').reduce((s,e)=>{
    const [sh,sm]=e.start.split(':').map(Number), [eh,em]=e.end.split(':').map(Number);
    return s+(eh*60+em)-(sh*60+sm);
  }, 0);

  // Stats
  document.getElementById('wstats').innerHTML = [
    {n: hMax>0 ? Math.round(hDone/hMax*100)+'%' : '–', l:'Habits\nQuote'},
    {n: wEvs.length, l:'Termine\nWoche'},
    {n: smins >= 60 ? Math.round(smins/60*10)/10+'h' : smins+'min', l:'Lernzeit\ngeplant'},
  ].map(s => `<div class="stat"><div class="n">${s.n}</div><div class="l">${s.l}</div></div>`).join('');

  // Grid
  const heads = '<tr><th></th>' + wds.map((d,i) => {
    const x = new Date(d+'T12:00'); const isT = d===TODAY;
    return `<th style="font-size:10px;color:${isT?'var(--gold)':'var(--mut)'};">${['Mo','Di','Mi','Do','Fr','Sa','So'][i]}<br>${x.getDate()}</th>`;
  }).join('') + '</tr>';
  const rows = S.habits.length === 0
    ? `<tr><td colspan="8" style="padding:14px;color:var(--mut);font-size:12px;text-align:center;">Keine Habits angelegt.</td></tr>`
    : S.habits.map(h => `<tr><td class="wn" title="${esc(h.name)}">${esc(h.name)}</td>` +
        wds.map(d => {
          const ok=h.log&&h.log[d], ft=d>TODAY, isT=d===TODAY;
          return `<td><div class="gd ${ok?'ok':ft?'ft':'no'}${isT?' td':''}">${ok?'✓':ft?'·':'✗'}</div></td>`;
        }).join('') + '</tr>'
      ).join('');
  document.getElementById('wgrid').innerHTML = heads + rows;

  // Events
  const tc = {fixed:'var(--blu)',study:'var(--grn)',todo:'var(--red)'};
  document.getElementById('weekEvents').innerHTML = wEvs.length === 0
    ? '<div class="empty">Noch keine Termine diese Woche.</div>'
    : wEvs.sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start))
        .map(e => {
          const x = new Date(e.date+'T12:00');
          return `<div class="li" onclick="openEv('${e.id}')">
            <div class="ev-dot" style="background:${tc[e.type]||'var(--gold)'}; margin-top:5px;"></div>
            <div class="li-txt">
              ${esc(e.title)}
              <div class="li-sub">${WD[x.getDay()]} ${x.getDate()}.${x.getMonth()+1} · ${e.start}–${e.end}</div>
            </div>
          </div>`;
        }).join('');

  // Todos
  const todos = S.todos.slice().sort((a,b) => (a.done-b.done)||(b.created-a.created));
  document.getElementById('todoList').innerHTML = todos.length === 0
    ? '<div class="empty">Keine To-dos.</div>'
    : todos.map(t => `<div class="li" onclick="togT('${t.id}')">
        <div class="check${t.done?' on':''}">${t.done?'✓':''}</div>
        <div class="li-txt${t.done?' done':''}">${esc(t.text)}</div>
        <span class="li-right">${{today:'Heute',week:'Woche',someday:'Mal'}[t.when]||''}</span>
        <span class="li-right" onclick="event.stopPropagation();delT('${t.id}')" style="color:var(--red);padding:4px;">✕</span>
      </div>`).join('');
}

function togT(id) {
  const t = S.todos.find(x=>x.id===id); if(!t) return;
  t.done = !t.done; save(); rWoche();
}
function delT(id) {
  S.todos = S.todos.filter(x=>x.id!==id); save(); rWoche();
}

// ════════════════════════════════
// HABITS
// ════════════════════════════════
function rHabits() {
  if (S.habits.length === 0) {
    document.getElementById('habitList').innerHTML =
      `<div class="card"><div class="empty" style="padding:24px 0;">
        Noch keine Gewohnheiten.<br><br>Leg welche an, z.B. "Training", "30 Min lernen", "Vitamine".
      </div></div>`;
    return;
  }
  document.getElementById('habitList').innerHTML = S.habits.map(h => {
    const s  = streak(h);
    const ms = maxStreak(h);
    const l30 = Array.from({length:28}, (_,i) => fd(addD(new Date(), -(27-i))));
    const heat = l30.map(d => `<div class="hc${h.log&&h.log[d]?' on':''}"></div>`).join('');
    const cat = ['körper','geist','karriere','sonstiges'];
    const catL = ['💪 Körper','🧠 Geist','📈 Karriere','⚡ Sonstiges'];
    return `<div class="card">
      <div class="habit-row">
        <div style="flex:1;">
          <div style="font-weight:700;font-size:16px;">${esc(h.name)}</div>
          <div class="li-sub">${catL[cat.indexOf(h.cat)||3]}</div>
        </div>
        <div class="streak-badge">🔥 ${s}</div>
        <button onclick="delH('${h.id}')" style="background:none;border:none;color:var(--mut);font-size:18px;cursor:pointer;padding:4px;">✕</button>
      </div>
      <div style="font-size:11px;color:var(--mut);margin-bottom:4px;">28 Tage · längster Streak: ${ms}</div>
      <div class="heat">${heat}</div>
    </div>`;
  }).join('');
}

function maxStreak(h) {
  if (!h.log) return 0;
  const ds = Object.keys(h.log).filter(k=>h.log[k]).sort();
  if (!ds.length) return 0;
  let mx=1, cur=1;
  for (let i=1; i<ds.length; i++) {
    const df = (new Date(ds[i]) - new Date(ds[i-1])) / 86400000;
    if (df===1) { cur++; mx=Math.max(mx,cur); } else cur=1;
  }
  return mx;
}
function delH(id) {
  if (!confirm('Habit löschen?')) return;
  S.habits = S.habits.filter(x=>x.id!==id); save(); rHabits();
}

// ZIELE
// ════════════════════════════════
function rZiele() {
  if (S.goals.length === 0) {
    document.getElementById('goalList').innerHTML =
      `<div class="card"><div class="empty" style="padding:24px 0;">
        Noch keine Ziele.<br><br>Lege z.B. "CFA Level I", "Bankdrücken 100kg" oder "30 Bücher lesen" an.
      </div></div>`;
    return;
  }
  document.getElementById('goalList').innerHTML = S.goals.map(g => {
    const pct = g.target>0 ? Math.min(100, Math.round(g.current/g.target*100)) : 0;
    const ms = g.milestones || [];
    const msDone = ms.filter(m=>m.done).length;
    const msH = ms.map(m =>
      `<div class="ms-row" onclick="togMs('${g.id}','${m.id}')">
        <div class="ms-circle${m.done?' on':''}">${m.done?'✓':''}</div>
        <div class="ms-txt${m.done?' done':''}">${esc(m.text)}</div>
      </div>`
    ).join('');
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
        <div>
          <div style="font-weight:700;font-size:17px;">${esc(g.name)}</div>
          ${g.unit ? `<div class="li-sub">${g.current} / ${g.target} ${esc(g.unit)}</div>` : ''}
          ${ms.length>0 ? `<div class="li-sub">${msDone}/${ms.length} Meilensteine</div>` : ''}
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <div class="goal-pct">${pct}%</div>
          <button onclick="openGoal('${g.id}')" class="btn btn-g btn-sm">✎</button>
        </div>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${pct>=80?'var(--gold)':'var(--grn)'};"></div></div>
      ${ms.length>0 ? `<div style="margin-top:14px;">${msH}</div>` : ''}
    </div>`;
  }).join('');
}

function togMs(gid, mid) {
  const g = S.goals.find(x=>x.id===gid); if(!g) return;
  const m = (g.milestones||[]).find(x=>x.id===mid); if(!m) return;
  m.done = !m.done;
  save(); rZiele();
}

// ════════════════════════════════
// ANALYSE
// ════════════════════════════════
function rAnalyse() {
  const l30 = Array.from({length:30}, (_,i) => fd(addD(new Date(), -i)));
  const sw   = sow(new Date());
  const wds  = Array.from({length:7}, (_,i) => fd(addD(sw,i)));

  // Stats
  const hDoneW  = S.habits.reduce((s,h) => s + wds.filter(d=>h.log&&h.log[d]).length, 0);
  const hMaxW   = S.habits.length * 7;
  const hDone30 = S.habits.reduce((s,h) => s + l30.filter(d=>h.log&&h.log[d]).length, 0);
  const openT   = S.todos.filter(t=>!t.done).length;
  const maxS    = S.habits.reduce((mx,h) => Math.max(mx, streak(h)), 0);

  let eSum=0, eCnt=0;
  Object.entries(S.energy).forEach(([d,e]) => {
    if (!l30.includes(d)) return;
    ['morning','afternoon','evening'].forEach(k => { if(e[k]) { eSum+=e[k]; eCnt++; } });
  });
  const avgE = eCnt > 0 ? (eSum/eCnt).toFixed(1) : '–';

  document.getElementById('statList').innerHTML = [
    {k:'Habits diese Woche', v: hMaxW>0 ? hDoneW+'/'+hMaxW+' ('+Math.round(hDoneW/hMaxW*100)+'%)' : '–'},
    {k:'Habits 30 Tage', v: S.habits.length>0 ? hDone30+'/'+(S.habits.length*30) : '–'},
    {k:'Längster Streak (heute)', v: maxS+' Tage'},
    {k:'Offene To-dos', v: openT},
    {k:'Ø Energie 30 Tage', v: avgE+'/5'},
    {k:'Journal-Einträge', v: S.journal.length},
    {k:'Ziele aktiv', v: S.goals.filter(g=>g.current<g.target).length},
  ].map(x => `<div class="kv"><span class="kv-k">${x.k}</span><span class="kv-v">${x.v}</span></div>`).join('');

  // Insights
  const ins = [];
  const hs = S.habits.map(h => ({name:h.name, done:l30.filter(d=>h.log&&h.log[d]).length, s:streak(h)}))
    .sort((a,b)=>b.done-a.done);
  if (hs.length>0 && hs[0].done>0)
    ins.push({i:'⭐', t:`"${hs[0].name}" ist dein stärkster Habit: ${hs[0].done}/30 Tagen.`});
  if (hs.length>1 && hs[hs.length-1].done < hs[0].done)
    ins.push({i:'📉', t:`"${hs[hs.length-1].name}" liegt bei nur ${Math.round(hs[hs.length-1].done/30*100)}%. Hier steckt ungenutztes Potenzial.`});
  S.habits.forEach(h => {
    const s = streak(h);
    if (s>=7) ins.push({i:'🔥', t:`${s} Tage "${h.name}" in Folge – das ist Disziplin.`});
    if (s===0 && (h.log&&Object.keys(h.log).length>0)) ins.push({i:'⚠️', t:`"${h.name}" Streak unterbrochen. Heute wieder anfangen.`});
  });
  if (hMaxW>0 && hDoneW/hMaxW >= .9)
    ins.push({i:'💪', t:`Starke Woche: ${Math.round(hDoneW/hMaxW*100)}% Habit-Quote.`});
  if (ins.length===0) ins.push({i:'📊', t:'Fülle alle Bereiche täglich – dann erscheinen hier persönliche Insights.'});
  document.getElementById('insightList').innerHTML = ins.slice(0,5).map(x =>
    `<div class="ins-row"><div class="ins-ico">${x.i}</div><div class="ins-txt">${x.t}</div></div>`
  ).join('');

  // Habit perf table
  document.getElementById('habitPerf').innerHTML = hs.length === 0
    ? '<div class="empty">Keine Habits.</div>'
    : hs.map(h => `<div class="kv"><span class="kv-k">${esc(h.name)}</span><span class="kv-v">${h.done}/30 · 🔥${h.s}</span></div>`).join('');

  // Journal
  document.getElementById('journalList').innerHTML = S.journal.length === 0
    ? '<div class="empty">Noch keine Einträge.</div>'
    : S.journal.slice(0,10).map(j => {
        const d = new Date(j.date+'T12:00');
        return `<div class="j-item">
          <div class="j-hdr">
            <span class="j-date">${WD[d.getDay()]}, ${d.getDate()}. ${MOS[d.getMonth()]}</span>
            <span>${j.mood||''}</span>
          </div>
          ${j.text ? `<div class="j-txt">${esc(j.text)}</div>` : ''}
        </div>`;
      }).join('');
}

function coachMsg() {
  const msgs = [
    {i:'🔥', t:'Konsistenz schlägt Motivation – jeden Tag erscheinen macht den Unterschied.'},
    {i:'📈', t:'Im Wealth Management zählt, wer diszipliniert ist. Erst bei sich, dann gegenüber Kunden.'},
    {i:'🧠', t:'30 Minuten fokussiertes Lernen täglich > 3 Stunden unstrukturiert am Wochenende.'},
    {i:'💪', t:'Körper, Geist, Karriere gleichzeitig aufzubauen ist schwer – genau deshalb macht es den Unterschied.'},
    {i:'⭐', t:'Der CFA ist hart. Wer heute anfängt, konsistent zu lernen, hat in 2 Jahren einen massiven Vorsprung.'},
    {i:'🎯', t:'Setze heute klare Prioritäten. Nicht alles ist gleich wichtig.'},
    {i:'⚡', t:'Die Lücke zwischen wer du bist und wer du sein willst überbrückst du mit heutigen Gewohnheiten.'},
  ];
  const idx = new Date().getDate() % msgs.length;
  const str = S.habits.reduce((mx,h) => Math.max(mx,streak(h)), 0);
  if (str >= 7) return {i:'🔥', t:`${str} Tage Streak – das ist echter Charakter. Heute nicht aufhören.`};
  return msgs[idx];
}

  openMo(`
    <h3>Neue Gewohnheit</h3>
    <div class="fld"><label>Name</label><input type="text" id="hn" placeholder="z.B. Training, 30 Min. lernen, Vitamine"></div>
    <div class="fld"><label>Kategorie</label><select id="hcat">
      <option value="körper">💪 Körper</option>
      <option value="geist">🧠 Geist</option>
      <option value="karriere">📈 Karriere</option>
      <option value="sonstiges">⚡ Sonstiges</option>
    </select></div>
    <div class="mo-acts">
      <button class="btn btn-g" onclick="closeMo()">Abbrechen</button>
      <button class="btn btn-p" onclick="saveHabit()">Speichern</button>
    </div>
  `);
  setTimeout(() => document.getElementById('hn').focus(), 300);
}
function saveHabit() {
  const n = document.getElementById('hn').value.trim(); if(!n) return;
  S.habits.push({id:uid(), name:n, cat:document.getElementById('hcat').value, log:{}});
  save(); closeMo(); rHabits();
}

// GOAL
function openGoal(id) {
  const g = id ? S.goals.find(x=>x.id===id) : null;
  const ms = g?.milestones || [];
  openMo(`
    <h3>${g?'Ziel bearbeiten':'Neues Ziel'}</h3>
    <div class="fld"><label>Name</label><input type="text" id="gn" value="${g?esc(g.name):''}"></div>
    <div class="mo-row">
      <div class="fld"><label>Aktuell</label><input type="number" id="gc" value="${g?g.current:0}"></div>
      <div class="fld"><label>Ziel</label><input type="number" id="gt" value="${g?g.target:100}"></div>
    </div>
    <div class="fld"><label>Einheit (z.B. %, kg, Kapitel)</label><input type="text" id="gu" value="${g?esc(g.unit||''):''}"></div>
    <div class="fld"><label>Meilensteine</label>
      <div id="msw">${ms.map((m,i) =>
        `<div style="display:flex;gap:8px;margin-bottom:8px;" data-mid="${m.id}" data-done="${m.done?1:0}">
          <input type="text" value="${esc(m.text)}" id="ms${i}" style="flex:1;">
          <button onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--mut);font-size:18px;cursor:pointer;flex-shrink:0;padding:0 4px;">✕</button>
        </div>`).join('')}
      </div>
      <button class="btn btn-g btn-sm" style="margin-top:4px;" onclick="addMs()">+ Meilenstein</button>
    </div>
    <div class="mo-acts">
      ${g ? `<button class="btn btn-s" onclick="delGoal('${g.id}')">🗑</button>` : ''}
      <button class="btn btn-g" onclick="closeMo()">Abbrechen</button>
      <button class="btn btn-p" onclick="saveGoal('${g?g.id:''}')">Speichern</button>
    </div>
  `);
  setTimeout(() => document.getElementById('gn').focus(), 300);
}
function addMs() {
  const w = document.getElementById('msw');
  const i = w.children.length;
  const d = document.createElement('div');
  d.style.cssText = 'display:flex;gap:8px;margin-bottom:8px;';
  d.dataset.mid = uid(); d.dataset.done = '0';
  d.innerHTML = `<input type="text" id="ms${i}" placeholder="Meilenstein…" style="flex:1;"><button onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--mut);font-size:18px;cursor:pointer;flex-shrink:0;padding:0 4px;">✕</button>`;
  w.appendChild(d);
  document.getElementById('ms'+i).focus();
}
function saveGoal(id) {
  const n = document.getElementById('gn').value.trim(); if(!n) return;
  const msItems = document.querySelectorAll('#msw > div');
  const milestones = Array.from(msItems).map((el, i) => ({
    id: el.dataset.mid || uid(),
    text: (document.getElementById('ms'+i)||{}).value?.trim() || '',
    done: el.dataset.done === '1'
  })).filter(m => m.text);
  const data = {
    name:n, current:Number(document.getElementById('gc').value)||0,
    target:Number(document.getElementById('gt').value)||100,
    unit:(document.getElementById('gu').value||'').trim(),
    milestones
  };
  if (id) { Object.assign(S.goals.find(g=>g.id===id), data); }
  else { S.goals.push({id:uid(),...data}); }
  save(); closeMo(); rZiele();
}
function delGoal(id) {
  if(!confirm('Ziel löschen?')) return;
  S.goals = S.goals.filter(g=>g.id!==id); save(); closeMo(); rZiele();
}

// JOURNAL
let selMood = null;
function openJournal() {
  selMood = null;
  openMo(`
    <h3>Journal-Eintrag</h3>
    <div class="fld"><label>Stimmung</label>
      <div class="moods">${['😄','🙂','😐','😩','🔥'].map(m =>
        `<div class="mood" onclick="pickMood(this,'${m}')">${m}</div>`
      ).join('')}</div>
    </div>
    <div class="fld"><label>Was war heute?</label>
      <textarea id="jt" placeholder="Was lief gut? Was nicht? Was nimmst du mit?"></textarea>
    </div>
    <div class="mo-acts">
      <button class="btn btn-g" onclick="closeMo()">Abbrechen</button>
      <button class="btn btn-p" onclick="saveJournal()">Speichern</button>
    </div>
  `);
  setTimeout(() => document.getElementById('jt').focus(), 300);
}
function pickMood(el, m) {
  selMood = m;
  document.querySelectorAll('.mood').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
}
function saveJournal() {
  const t = document.getElementById('jt').value.trim();
  if (!t && !selMood) { alert('Bitte Stimmung oder Text eingeben.'); return; }
  S.journal.unshift({id:uid(), date:TODAY, mood:selMood, text:t, created:Date.now()});
  save(); closeMo(); if(curView==='analyse') rAnalyse();
}

// FAB MENU
function openFab() {
  openMo(`
    <h3>Schnell hinzufügen</h3>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn btn-g" style="justify-content:flex-start;gap:14px;font-size:15px;" onclick="closeMo();openEv()">📅 Neuer Termin / Lernblock</button>
      <button class="btn btn-g" style="justify-content:flex-start;gap:14px;font-size:15px;" onclick="closeMo();openTodo()">✅ Neues To-do</button>
      <button class="btn btn-g" style="justify-content:flex-start;gap:14px;font-size:15px;" onclick="closeMo();openJournal()">✎ Journal-Eintrag</button>
      <button class="btn btn-g" style="justify-content:flex-start;gap:14px;font-size:15px;" onclick="closeMo();openPrio()">📌 Prioritäten setzen</button>
      <button class="btn btn-g" style="justify-content:flex-start;gap:14px;font-size:15px;" onclick="closeMo();openHabit()">🔄 Neue Gewohnheit</button>
    </div>
  `);
}

// DATA
function exportD() {
  const b = new Blob([JSON.stringify(S,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download = 'kontrollraum-'+TODAY+'.json'; a.click();
}
function importD(e) {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const d = JSON.parse(r.result);
      S = Object.assign({events:[],todos:[],habits:[],goals:[],journal:[],energy:{},prios:{}}, d);
      save(); renderView(curView); closeMo(); alert('Import erfolgreich!');
    } catch(err) { alert('Fehler beim Importieren.'); }
  };
  r.readAsText(f);
}

// INIT
rHeute();
</script>
