<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kontrollraum</title>
<style>
  :root{
    --bg:#0D0B09; --s1:#171410; --s2:#1F1B16; --s3:#252018;
    --bd:#2E2820; --txt:#EDE6D8; --mut:#8A7F72;
    --gold:#C9A24B; --gold2:#8a6e33;
    --grn:#6B9E6E; --red:#B8624A; --blu:#5B8FCC;
    --nh:64px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);font-size:15px;}
  #app{height:100vh;display:flex;flex-direction:column;}
  #views{flex:1;overflow:hidden;position:relative;}
  .view{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:16px 16px calc(var(--nh) + 20px) 16px;display:none;}
  .view.active{display:block;}
  /* NAV */
  #nav{height:var(--nh);background:var(--s1);border-top:1px solid var(--bd);display:flex;padding-bottom:env(safe-area-inset-bottom);flex-shrink:0;}
  .nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--mut);font-size:9.5px;cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:inherit;}
  .nb .ni{font-size:20px;line-height:1;}
  .nb.active{color:var(--gold);}
  /* CARDS */
  .card{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:12px;}
  .ctitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mut);margin-bottom:12px;}
  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:inherit;}
  .bp{background:var(--gold);color:#0D0B09;}
  .bg{background:transparent;color:var(--mut);border:1px solid var(--bd);}
  .bs{padding:7px 12px;font-size:12px;border-radius:8px;}
  /* FORM */
  input,textarea,select{background:var(--s1);border:1px solid var(--bd);color:var(--txt);border-radius:10px;padding:12px 14px;font-size:15px;width:100%;font-family:inherit;-webkit-appearance:none;}
  textarea{resize:vertical;min-height:80px;}
  label{font-size:12px;color:var(--mut);display:block;margin-bottom:4px;}
  .fld{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
  .row2{display:flex;gap:10px;}.row2>*{flex:1;}
  /* COACH CARD */
  .coach{background:linear-gradient(135deg,#1f1a0f,#241e10);border:1px solid var(--gold2);border-radius:12px;padding:16px;margin-bottom:12px;display:flex;gap:12px;align-items:flex-start;}
  .cico{font-size:26px;flex-shrink:0;}
  .clbl{font-size:10px;color:var(--gold);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
  .ctxt{font-size:14px;line-height:1.5;}
  /* PROGRESS */
  .ptrack{height:6px;background:var(--s1);border-radius:10px;overflow:hidden;margin-top:10px;}
  .pfill{height:100%;background:var(--grn);border-radius:10px;transition:width .3s;}
  /* LISTS */
  .litem{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bd);}
  .litem:last-child{border-bottom:none;padding-bottom:0;}
  .cbox{width:26px;height:26px;border-radius:8px;border:2px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;cursor:pointer;}
  .cbox.done{background:var(--grn);border-color:var(--grn);}
  .lbl{flex:1;font-size:14px;}
  .lbl.done{text-decoration:line-through;color:var(--mut);}
  /* SCHEDULE */
  .sitem{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--bd);cursor:pointer;}
  .sitem:last-child{border-bottom:none;padding-bottom:0;}
  .stime{font-size:12px;color:var(--gold);font-weight:700;min-width:44px;}
  .sdot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
  .stitle{font-size:14px;font-weight:600;}
  .ssub{font-size:11px;color:var(--mut);margin-top:2px;}
  /* WEEK */
  .wstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
  .wstat{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:14px 8px;text-align:center;}
  .wstat .n{font-size:22px;font-weight:700;color:var(--gold);}
  .wstat .l{font-size:10px;color:var(--mut);margin-top:2px;text-transform:uppercase;letter-spacing:.4px;}
  .hgrid{width:100%;border-collapse:collapse;}
  .hgrid td,.hgrid th{text-align:center;padding:3px;}
  .hgrid .hn{text-align:left;font-size:11px;color:var(--mut);padding-right:6px;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .gd{width:24px;height:24px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;}
  .gd.ok{background:var(--grn);color:#0D0B09;}
  .gd.no{background:var(--s1);color:var(--mut);}
  .gd.ft{background:transparent;color:var(--bd);}
  .gd.td{border:1px solid var(--gold);}
  /* HABITS */
  .hcard{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:10px;}
  .htop{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .hico{font-size:22px;}
  .hinfo{flex:1;}
  .hname{font-weight:600;font-size:15px;}
  .hcat{font-size:11px;color:var(--mut);}
  .sbadge{display:flex;flex-direction:column;align-items:center;background:var(--s1);border-radius:8px;padding:6px 10px;}
  .snum{font-size:18px;font-weight:700;color:var(--gold);}
  .slbl{font-size:9px;color:var(--mut);text-transform:uppercase;}
  .hmap{display:flex;flex-wrap:wrap;gap:3px;margin-top:10px;}
  .hcell{width:18px;height:18px;border-radius:3px;background:var(--s1);}
  .hcell.h{background:var(--grn);}
  .hcell.hm{background:#2a4a2e;}
  /* GOALS */
  .gcard{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:12px;}
  .ghdr{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px;}
  .gname{font-weight:700;font-size:16px;}
  .gpct{font-size:22px;font-weight:700;color:var(--gold);}
  .ms{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd);cursor:pointer;}
  .ms:last-child{border-bottom:none;padding-bottom:0;}
  .msc{width:20px;height:20px;border-radius:50%;border:2px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;}
  .msc.done{background:var(--gold);border-color:var(--gold);color:#0D0B09;}
  .mst{font-size:13px;flex:1;}
  .mst.done{text-decoration:line-through;color:var(--mut);}
  /* ANALYTICS */
  .ins{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--bd);}
  .ins:last-child{border-bottom:none;padding-bottom:0;}
  .iico{font-size:22px;flex-shrink:0;}
  .itxt{font-size:14px;line-height:1.5;}
  .sr{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bd);}
  .sr:last-child{border-bottom:none;padding-bottom:0;}
  .sk{font-size:14px;color:var(--mut);}
  .sv{font-size:14px;font-weight:600;}
  /* ENERGY */
  .eslots{display:flex;gap:8px;}
  .eslot{flex:1;display:flex;flex-direction:column;gap:5px;align-items:center;}
  .eslot label{font-size:11px;color:var(--mut);text-align:center;}
  .estars{display:flex;gap:1px;justify-content:center;}
  .star{font-size:16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  /* PRIORITY */
  .pitem{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd);cursor:pointer;}
  .pitem:last-child{border-bottom:none;padding-bottom:0;}
  .pnum{width:26px;height:26px;border-radius:50%;background:var(--s1);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--gold);flex-shrink:0;margin-top:2px;}
  .ptxt{flex:1;font-size:14px;line-height:1.4;}
  .ptxt.empty{color:var(--mut);font-style:italic;}
  /* FAB */
  #fab{position:fixed;bottom:calc(var(--nh) + 16px);right:16px;width:52px;height:52px;border-radius:50%;background:var(--gold);color:#0D0B09;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(201,162,75,.5);display:flex;align-items:center;justify-content:center;z-index:40;-webkit-tap-highlight-color:transparent;}
  /* DRAWER */
  #drw{position:fixed;inset:0;z-index:70;display:none;}
  #drw.open{display:flex;}
  #drwbg{position:absolute;inset:0;background:rgba(0,0,0,.6);}
  #drwp{position:absolute;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--bd);border-radius:20px 20px 0 0;padding:20px 16px calc(var(--nh) + 20px) 16px;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s ease;}
  #drw.open #drwp{transform:translateY(0);}
  .drwh{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 20px auto;}
  /* MODAL */
  #movo{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:80;display:none;align-items:flex-end;}
  #movo.open{display:flex;}
  #mo{background:var(--s2);border-top:1px solid var(--bd);border-radius:20px 20px 0 0;padding:20px 16px calc(env(safe-area-inset-bottom) + 20px) 16px;width:100%;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s ease;}
  #movo.open #mo{transform:translateY(0);}
  #mo h3{font-size:18px;font-weight:700;margin-bottom:16px;}
  .mact{display:flex;gap:10px;margin-top:16px;}
  .mact .btn{flex:1;padding:14px;}
  /* MISC */
  .divd{height:1px;background:var(--bd);margin:16px 0;}
  .empt{text-align:center;color:var(--mut);font-size:14px;padding:24px 0;}
  .sech{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
  /* MOOD */
  .moodrow{display:flex;gap:8px;margin:8px 0 16px 0;}
  .mopt{flex:1;text-align:center;padding:10px 4px;background:var(--s1);border:2px solid var(--bd);border-radius:10px;font-size:22px;cursor:pointer;}
  .mopt.sel{border-color:var(--gold);background:var(--s2);}
  /* journal */
  .ji{padding:12px 0;border-bottom:1px solid var(--bd);}
  .ji:last-child{border-bottom:none;}
  .jh{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
  .jd{font-size:11px;color:var(--gold);font-weight:600;}
  .jtx{font-size:13px;color:var(--mut);line-height:1.5;}
  /* today header */
  .thdr{margin-bottom:16px;}
  .tdate{font-size:12px;color:var(--mut);}
  .tgreet{font-size:22px;font-weight:700;margin-top:4px;}
</style>
</head>
<body>
<div id="app">
  <div id="views">
    <div class="view active" id="v-heute"></div>
    <div class="view" id="v-woche"></div>
    <div class="view" id="v-habits"></div>
    <div class="view" id="v-ziele"></div>
    <div class="view" id="v-analyse"></div>
  </div>
  <nav id="nav">
    <button class="nb active" data-v="heute"><span class="ni">🏠</span>Heute</button>
    <button class="nb" data-v="woche"><span class="ni">📅</span>Woche</button>
    <button class="nb" data-v="habits"><span class="ni">✅</span>Habits</button>
    <button class="nb" data-v="ziele"><span class="ni">🎯</span>Ziele</button>
    <button class="nb" data-v="analyse"><span class="ni">📊</span>Analyse</button>
  </nav>
</div>
<button id="fab">+</button>
<div id="drw"><div id="drwbg"></div><div id="drwp"><div class="drwh"></div><div id="drwc"></div></div></div>
<div id="movo"><div id="mo"><div id="moc"></div></div></div>

<script>
// ===== STATE =====
const SK='kr_v3';
let S=load();
function load(){
  try{const r=localStorage.getItem(SK);if(r)return JSON.parse(r);}catch(e){}
  return{profile:{name:'Luke'},events:[],todos:[],habits:[],goals:[],journal:[],energy:{},priorities:{}};
}
function save(){localStorage.setItem(SK,JSON.stringify(S));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

// ===== DATE =====
const WD=['So','Mo','Di','Mi','Do','Fr','Sa'];
const MO=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
const MOF=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
function fd(d){return d.toISOString().slice(0,10);}
function addD(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function sow(d){const x=new Date(d);x.setDate(x.getDate()-((x.getDay()+6)%7));x.setHours(0,0,0,0);return x;}
function tod(){const d=new Date();d.setHours(0,0,0,0);return d;}
const TOD=fd(tod());

// ===== STREAK =====
function streak(h){let n=0,d=tod();while(true){if(h.log&&h.log[fd(d)]){n++;d=addD(d,-1);}else break;}return n;}
function maxStreak(h){
  if(!h.log)return 0;
  const ds=Object.keys(h.log).filter(k=>h.log[k]).sort();
  if(!ds.length)return 0;
  let mx=1,cur=1;
  for(let i=1;i<ds.length;i++){const df=(new Date(ds[i])-new Date(ds[i-1]))/86400000;if(df===1){cur++;mx=Math.max(mx,cur);}else cur=1;}
  return mx;
}

// ===== COACH =====
function coach(){
  const ins=[];
  const pris=S.priorities[TOD];
  if(!pris||pris.filter(p=>p&&p.trim()).length===0)
    ins.push({i:'📌',t:'Du hast heute noch keine Prioritäten gesetzt. Was sind die 3 Dinge, die heute wirklich zählen?'});
  S.habits.forEach(h=>{
    const s=streak(h);
    if(s>2&&!(h.log&&h.log[TOD]))ins.push({i:'⚠️',t:`Dein ${s}-Tage-Streak bei "${h.name}" ist heute in Gefahr. Hak es ab.`});
    if(s>=7&&h.log&&h.log[TOD])ins.push({i:'🔥',t:`${s} Tage "${h.name}" in Folge – das ist echter Charakter.`});
  });
  S.goals.forEach(g=>{
    const p=Math.round((g.current/g.target)*100);
    if(p>=80&&p<100)ins.push({i:'🎯',t:`Du bist ${p}% beim Ziel "${g.name}". Jetzt Finish Line anvisieren.`});
  });
  const yd=fd(addD(tod(),-1));
  if(S.habits.length>0){
    const done=S.habits.filter(h=>h.log&&h.log[yd]).length;
    if(done===S.habits.length&&S.habits.length>0)ins.push({i:'⭐',t:`Gestern alle ${done} Habits erledigt. Perfekter Tag – heute wiederholen.`});
    if(done===0&&S.habits.length>0)ins.push({i:'💡',t:'Gestern keine Habits. Heute frischer Start – fang mit dem kleinsten an.'});
  }
  const def=[
    {i:'🧠',t:'Konsistenz schlägt Motivation. Wer jeden Tag erscheint, gewinnt langfristig.'},
    {i:'📈',t:'Im Private Banking entscheidet Disziplin – zuerst bei dir selbst, dann gegenüber Kunden.'},
    {i:'💪',t:'Körper, Geist, Karriere – alle drei gleichzeitig zu bauen ist schwer. Genau deshalb macht es den Unterschied.'},
    {i:'⚡',t:'Die Lücke zwischen wer du bist und wer du sein willst überbrückst du mit heutigen Gewohnheiten.'},
    {i:'🏦',t:'CFA, Private Banking, Physik – dein Weg ist klar. Heute ist der nächste Schritt darauf.'},
  ];
  if(ins.length===0)return def[Math.floor(Math.random()*def.length)];
  return ins[Math.floor(Math.random()*ins.length)];
}

// ===== NAV =====
let cv='heute';
document.querySelectorAll('.nb').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.nb').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    cv=b.dataset.v;
    document.getElementById('v-'+cv).classList.add('active');
    render(cv);
  });
});
function render(v){
  if(v==='heute')rHeu();
  if(v==='woche')rWoche();
  if(v==='habits')rHabits();
  if(v==='ziele')rZiele();
  if(v==='analyse')rAnalyse();
}

// ===== TODAY =====
function rHeu(){
  const d=new Date();
  const h=d.getHours();
  const gr=h<12?'Guten Morgen':h<18?'Guten Tag':'Guten Abend';
  const c=coach();
  const pris=S.priorities[TOD]||['','',''];
  const priH=pris.map((p,i)=>`<div class="pitem" onclick="openPri()"><div class="pnum">${i+1}</div><div class="ptxt${!p?' empty':''}">${p?esc(p):'Tippe zum Setzen...'}</div></div>`).join('');
  const doneH=S.habits.filter(h=>h.log&&h.log[TOD]).length;
  const totH=S.habits.length;
  const habH=totH===0?'<div style="color:var(--mut);font-size:13px;padding:6px 0;">→ Habits anlegen unter ✅</div>':
    S.habits.map(h=>{
      const done=h.log&&h.log[TOD];const s=streak(h);
      return`<div class="litem" style="cursor:pointer;" onclick="togHabit('${h.id}')"><div class="cbox${done?' done':''}">${done?'✓':''}</div><div class="lbl">${esc(h.name)}</div>${s>1?`<span style="font-size:11px;color:var(--gold);font-weight:600;">🔥${s}</span>`:''}</div>`;
    }).join('');
  const pp=totH>0?Math.round(doneH/totH*100):0;
  const evs=S.events.filter(e=>e.date===TOD).sort((a,b)=>a.start.localeCompare(b.start));
  const tc={fixed:'var(--blu)',study:'var(--grn)',todo:'var(--red)'};
  const schedH=evs.length===0?'<div style="color:var(--mut);font-size:13px;padding:6px 0;">Nichts geplant – tippe + unten</div>':
    evs.map(e=>`<div class="sitem" onclick="openEv('${e.id}')"><div class="stime">${e.start}</div><div class="sdot" style="background:${tc[e.type]||'var(--gold)'}"></div><div><div class="stitle">${esc(e.title)}</div><div class="ssub">${e.end}${e.type==='study'?' · Lernblock':e.type==='fixed'?' · Termin':' · Aufgabe'}</div></div></div>`).join('');
  const eng=S.energy[TOD]||{};
  const eSlots=[{k:'morning',l:'Morgen'},{k:'afternoon',l:'Mittag'},{k:'evening',l:'Abend'}];
  const eH=eSlots.map(s=>{
    const v=eng[s.k]||0;
    const stars=[1,2,3,4,5].map(n=>`<span class="star" onclick="setE('${s.k}',${n})">${n<=v?'★':'☆'}</span>`).join('');
    return`<div class="eslot"><label>${s.l}</label><div class="estars">${stars}</div></div>`;
  }).join('');
  document.getElementById('v-heute').innerHTML=`
    <div class="thdr"><div class="tdate">${WD[d.getDay()]}, ${d.getDate()}. ${MOF[d.getMonth()]} ${d.getFullYear()}</div><div class="tgreet">${gr}, ${S.profile.name} 👋</div></div>
    <div class="coach"><div class="cico">${c.i}</div><div><div class="clbl">Coach</div><div class="ctxt">${c.t}</div></div></div>
    <div class="card"><div class="ctitle">Meine 3 Prioritäten heute</div>${priH}</div>
    <div class="card">
      <div class="sech"><div class="ctitle" style="margin:0;">Gewohnheiten ${doneH}/${totH}</div><span style="font-size:12px;color:var(--gold);">${pp}%</span></div>
      ${habH}${totH>0?`<div class="ptrack"><div class="pfill" style="width:${pp}%"></div></div>`:''}
    </div>
    <div class="card">
      <div class="sech"><div class="ctitle" style="margin:0;">Zeitplan heute</div><button class="btn bg bs" onclick="openEv()">+ Termin</button></div>
      ${schedH}
    </div>
    <div class="card"><div class="ctitle">Energie heute</div><div class="eslots">${eH}</div></div>
  `;
}
function togHabit(id){const h=S.habits.find(x=>x.id===id);if(!h)return;if(!h.log)h.log={};h.log[TOD]=!h.log[TOD];save();rHeu();}
function setE(slot,val){if(!S.energy[TOD])S.energy[TOD]={};S.energy[TOD][slot]=val;save();rHeu();}

// ===== WEEK =====
function rWoche(){
  const sw=sow(tod());
  const wds=Array.from({length:7},(_,i)=>fd(addD(sw,i)));
  const wevs=S.events.filter(e=>wds.includes(e.date));
  const hdone=S.habits.reduce((s,h)=>s+wds.filter(d=>h.log&&h.log[d]).length,0);
  const hmax=S.habits.length*7;
  const smins=wevs.filter(e=>e.type==='study').reduce((s,e)=>{
    const[sh,sm]=e.start.split(':').map(Number);const[eh,em]=e.end.split(':').map(Number);
    return s+(eh*60+em)-(sh*60+sm);
  },0);

  }).join('')||'<div style="color:var(--mut);font-size:13px;padding:6px 0;">Noch keine Termine diese Woche.</div>';
  document.getElementById('v-woche').innerHTML=`
    <h2 style="margin-bottom:14px;font-size:18px;">Diese Woche</h2>
    <div class="wstats">
      <div class="wstat"><div class="n">${hdone}</div><div class="l">Habits<br>erledigt</div></div>
      <div class="wstat"><div class="n">${wevs.length}</div><div class="l">Termine<br>geplant</div></div>
      <div class="wstat"><div class="n">${Math.round(smins/60*10)/10}h</div><div class="l">Lernzeit<br>geplant</div></div>
    </div>

    <div class="card"><div class="sech"><div class="ctitle" style="margin:0;">Termine</div><button class="btn bg bs" onclick="openEv()">+ Termin</button></div>${evH}</div>
  `;
}

  }).join('');

  `;
}
function togMs(gid,mid){
  const g=S.goals.find(x=>x.id===gid);if(!g)return;
  const m=(g.milestones||[]).find(x=>x.id===mid);if(!m)return;
  m.done=!m.done;
  if(g.milestones.length>0&&g.unit==='%')g.current=Math.round((g.milestones.filter(x=>x.done).length/g.milestones.length)*100);
  save();rZiele();
}

// ===== ANALYSE =====
function rAnalyse(){
  const l30=Array.from({length:30},(_,i)=>fd(addD(tod(),-i)));
  const wds=Array.from({length:7},(_,i)=>fd(addD(sow(tod()),i)));
  const wdone=S.habits.reduce((s,h)=>s+wds.filter(d=>h.log&&h.log[d]).length,0);
  const wmax=S.habits.length*7;
  const wp=wmax>0?Math.round(wdone/wmax*100):0;
  const hs=S.habits.map(h=>({name:h.name,done:l30.filter(d=>h.log&&h.log[d]).length,s:streak(h),ms:maxStreak(h)})).sort((a,b)=>b.done-a.done);
  const best=hs[0];const worst=hs[hs.length-1];
  const edays=Object.keys(S.energy).filter(d=>l30.includes(d));
  let esum=0,ecnt=0;
  edays.forEach(d=>{const e=S.energy[d];['morning','afternoon','evening'].forEach(k=>{if(e[k]){esum+=e[k];ecnt++;}});});
  const avgE=ecnt>0?(esum/ecnt).toFixed(1):'-';
  const ins=[];
  if(best&&best.done>0)ins.push({i:'⭐',t:`"${best.name}" ist dein stärkster Habit: ${best.done}/30 Tagen (${Math.round(best.done/30*100)}%).`});
  if(worst&&worst!==best&&worst.done<best.done)ins.push({i:'📉',t:`"${worst.name}" liegt bei nur ${Math.round(worst.done/30*100)}%. Hier steckt ungenutztes Potenzial.`});
  if(avgE!=='-')ins.push({i:'⚡',t:`Ø Energie: ${avgE}/5 in den letzten 30 Tagen.`});
  if(wp>70)ins.push({i:'🔥',t:`Starke Woche: ${wp}% aller Habits erledigt.`});
  else if(wp<40&&wmax>0)ins.push({i:'⚠️',t:`Nur ${wp}% Habits diese Woche. Was hat gefehlt?`});
  if(S.todos.filter(t=>!t.done).length>5)ins.push({i:'📋',t:`${S.todos.filter(t=>!t.done).length} offene To-dos – Zeit für eine Priorisierung.`});
  const cg=S.goals.filter(g=>g.current>=g.target);
  if(cg.length>0)ins.push({i:'🏆',t:`${cg.length} Ziel${cg.length>1?'e':''} bereits erreicht!`});
  if(ins.length===0)ins.push({i:'📊',t:'Nutze das Dashboard täglich und füll alle Bereiche – dann entstehen hier echte Insights.'});
  const iH=ins.map(x=>`<div class="ins"><div class="iico">${x.i}</div><div class="itxt">${x.t}</div></div>`).join('');
  const stats=[
    {k:'Habits diese Woche',v:`${wdone}/${wmax} (${wp}%)`},
    {k:'Habits 30 Tage gesamt',v:`${S.habits.reduce((s,h)=>s+l30.filter(d=>h.log&&h.log[d]).length,0)}/${S.habits.length*30}`},
    {k:'Offene To-dos',v:S.todos.filter(t=>!t.done).length},
    {k:'Termine total',v:S.events.length},
    {k:'Journal-Einträge',v:S.journal.length},
    {k:'Ø Energie (30T)',v:`${avgE}/5`},
    {k:'Aktive Ziele',v:S.goals.filter(g=>g.current<g.target).length},
  ].map(x=>`<div class="sr"><span class="sk">${x.k}</span><span class="sv">${x.v}</span></div>`).join('');
  const htbl=hs.length===0?'<div class="empt">Noch keine Habits.</div>':hs.map(h=>`<div class="sr"><span class="sk">${esc(h.name)}</span><span class="sv">${h.done}/30 · 🔥${h.s} · max ${h.ms}</span></div>`).join('');
  document.getElementById('v-analyse').innerHTML=`
    <h2 style="font-size:18px;margin-bottom:14px;">Analyse</h2>
    <div class="card"><div class="ctitle">Coach-Insights</div>${iH}</div>
    <div class="card"><div class="ctitle">Deine Zahlen</div>${stats}</div>
    ${S.habits.length>0?`<div class="card"><div class="ctitle">Habits (30 Tage)</div>${htbl}</div>`:''}
  `;
}

  w.appendChild(d);document.getElementById(`ms${i}`).focus();
}
function saveGoal(id,cnt,idsStr,doneStr){
  const n=document.getElementById('gn').value.trim();if(!n)return;
  const ids=idsStr?idsStr.split(',').filter(Boolean):[];
  const dones=doneStr?doneStr.split(',').filter(Boolean):[];
  const msInputs=document.querySelectorAll('[id^="ms"]');
  const milestones=Array.from(msInputs).map((inp,i)=>({id:ids[i]||uid(),text:inp.value.trim(),done:dones[i]==='1'})).filter(m=>m.text);
  const data={name:n,current:Number(document.getElementById('gc').value)||0,target:Number(document.getElementById('gt').value)||100,unit:(document.getElementById('gu').value||'').trim(),milestones};
  if(id){Object.assign(S.goals.find(g=>g.id===id),data);}else{S.goals.push({id:uid(),...data});}
  save();closeMo();rZiele();
}
function delGoal(id){if(!confirm('Ziel löschen?'))return;S.goals=S.goals.filter(g=>g.id!==id);save();closeMo();rZiele();}

// ===== MODAL =====
function closeMo(){document.getElementById('movo').classList.remove('open');}
document.getElementById('movo').addEventListener('click',e=>{if(e.target.id==='movo')closeMo();});

// ===== DATA =====
function expData(){
  const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`kontrollraum-${TOD}.json`;a.click();
}
function impData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      S=Object.assign({profile:{name:'Luke'},events:[],todos:[],habits:[],goals:[],journal:[],energy:{},priorities:{}},d);
      save();render(cv);closeDrw();alert('Import erfolgreich!');
    }catch(err){alert('Fehler beim Importieren.');}
  };
  r.readAsText(f);
}
function setName(){const n=prompt('Dein Name:',S.profile.name);if(n){S.profile.name=n.trim();save();closeDrw();render(cv);}}

// ===== INIT =====
rHeu();
</script>
